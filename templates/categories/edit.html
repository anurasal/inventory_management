{% extends "layout.html" %}

{% block title %}
Edit Category
{% endblock %}


{% block content %}

<div class="container mt-4">

    <h2>Edit Category</h2>


    <form method="POST">


        <div class="mb-3">

            <label class="form-label">
                Category Name
            </label>


            <input
                type="text"
                name="name"
                class="form-control"
                value="{{ category.name }}"
                required>


        </div>



        <button class="btn btn-primary">
            Update Category
        </button>


        <a href="/categories/" class="btn btn-secondary">
            Cancel
        </a>


    </form>


</div>


{% endblock %}
