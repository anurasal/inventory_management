{% extends "layout.html" %}

{% block title %}
Categories
{% endblock %}


{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Categories</h2>

        <div>

            <a href="/categories/add" class="btn btn-primary">
                Add Category
            </a>

            <a href="/categories/export" class="btn btn-success">
                Export CSV
            </a>

        </div>

    </div>



    <form method="GET" action="/categories/" class="mb-3">

        <div class="input-group">

            <input
                type="text"
                name="search"
                class="form-control"
                placeholder="Search categories..."
                value="{{ search }}"
            >

            <button class="btn btn-outline-secondary">
                Search
            </button>

        </div>

    </form>



    <div class="table-responsive">

        <table class="table table-bordered table-striped">


            <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Category Name</th>

                    <th>Actions</th>

                </tr>

            </thead>



            <tbody>


            {% for category in categories %}


                <tr>

                    <td>
                        {{ category.id }}
                    </td>


                    <td>
                        {{ category.name }}
                    </td>


                    <td>

                        <a
                        href="/categories/edit/{{ category.id }}"
                        class="btn btn-warning btn-sm">

                            Edit

                        </a>


                        <form action="{{ url_for('categories.delete', id=category.id) }}"
                              method="POST"
                              style="display:inline;">

                            <button
                                type="submit"
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this category?')">

                                Delete

                            </button>

                        </form>


                    </td>


                </tr>


            {% else %}


                <tr>

                    <td colspan="3" class="text-center">

                        No categories found

                    </td>

                </tr>


            {% endfor %}



            </tbody>


        </table>


    </div>


</div>


{% endblock %}
