{% extends "layout.html" %}

{% block title %}
Add Category
{% endblock %}


{% block content %}

<div class="container mt-4">

    <h2>Add Category</h2>


    <form method="POST">


        <div class="mb-3">

            <label class="form-label">
                Category Name
            </label>


            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Enter category name"
                required>

        </div>



        <button class="btn btn-primary">
            Save Category
        </button>


        <a href="/categories/" class="btn btn-secondary">
            Cancel
        </a>


    </form>


</div>


{% endblock %}
