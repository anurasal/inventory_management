{% extends "layout.html" %}

{% block title %}
Edit Product
{% endblock %}


{% block content %}

<div class="container mt-4">

    <h2>Edit Product</h2>


    <form method="POST">


        <div class="mb-3">

            <label class="form-label">
                Product Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                value="{{ product.name }}"
                required>

        </div>



        <div class="mb-3">

            <label class="form-label">
                Category
            </label>

            <select
                name="category_id"
                class="form-control"
                required>


                {% for category in categories %}

                <option
                    value="{{ category.id }}"
                    {% if category.id == product.category_id %}
                    selected
                    {% endif %}>

                    {{ category.name }}

                </option>

                {% endfor %}


            </select>

        </div>



        <div class="mb-3">

            <label class="form-label">
                Supplier
            </label>


            <select
                name="supplier_id"
                class="form-control"
                required>


                {% for supplier in suppliers %}


                <option
                    value="{{ supplier.id }}"
                    {% if supplier.id == product.supplier_id %}
                    selected
                    {% endif %}>

                    {{ supplier.name }}

                </option>


                {% endfor %}


            </select>


        </div>



        <div class="mb-3">

            <label class="form-label">
                Quantity
            </label>


            <input
                type="number"
                name="quantity"
                class="form-control"
                value="{{ product.quantity }}"
                min="0"
                required>


        </div>



        <div class="mb-3">

            <label class="form-label">
                Purchase Price
            </label>


            <input
                type="number"
                step="0.01"
                name="purchase_price"
                class="form-control"
                value="{{ product.purchase_price }}"
                required>


        </div>



        <div class="mb-3">

            <label class="form-label">
                Selling Price
            </label>


            <input
                type="number"
                step="0.01"
                name="selling_price"
                class="form-control"
                value="{{ product.selling_price }}"
                required>


        </div>



        <button class="btn btn-primary">
            Update Product
        </button>


        <a href="/products/" class="btn btn-secondary">
            Cancel
        </a>


    </form>


</div>

{% endblock %}
