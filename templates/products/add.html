{% extends "layout.html" %}

{% block title %}
Add Product
{% endblock %}


{% block content %}

<div class="container mt-4">

    <h2>Add Product</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">
                Product Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                required>
        </div>


        <div class="mb-3">

            <label class="form-label">
                Category
            </label>

            <select
                name="category_id"
                class="form-control"
                required>

                <option value="">
                    Select Category
                </option>

                {% for category in categories %}

                <option value="{{ category.id }}">
                    {{ category.name }}
                </option>

                {% endfor %}

            </select>

        </div>


        <div class="mb-3">

            <label class="form-label">
                Supplier
            </label>

            <select
                name="supplier_id"
                class="form-control"
                required>

                <option value="">
                    Select Supplier
                </option>


                {% for supplier in suppliers %}

                <option value="{{ supplier.id }}">
                    {{ supplier.name }}
                </option>

                {% endfor %}


            </select>

        </div>


        <div class="mb-3">

            <label class="form-label">
                Quantity
            </label>

            <input
                type="number"
                name="quantity"
                class="form-control"
                min="0"
                required>

        </div>


        <div class="mb-3">

            <label class="form-label">
                Purchase Price
            </label>

            <input
                type="number"
                step="0.01"
                name="purchase_price"
                class="form-control"
                required>

        </div>


        <div class="mb-3">

            <label class="form-label">
                Selling Price
            </label>

            <input
                type="number"
                step="0.01"
                name="selling_price"
                class="form-control"
                required>

        </div>


        <button class="btn btn-primary">
            Save Product
        </button>


        <a href="/products/" class="btn btn-secondary">
            Cancel
        </a>


    </form>


</div>

{% endblock %}
