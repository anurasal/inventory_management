{% extends "layout.html" %}

{% block title %}
Edit Supplier
{% endblock %}


{% block content %}

<div class="container mt-4">

    <h2>Edit Supplier</h2>


    <form method="POST">


        <div class="mb-3">

            <label class="form-label">
                Supplier Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                value="{{ supplier.name }}"
                required>

        </div>



        <div class="mb-3">

            <label class="form-label">
                Contact Person
            </label>

            <input
                type="text"
                name="contact_person"
                class="form-control"
                value="{{ supplier.contact_person }}">

        </div>



        <div class="mb-3">

            <label class="form-label">
                Phone Number
            </label>

            <input
                type="text"
                name="phone"
                class="form-control"
                value="{{ supplier.phone }}">

        </div>



        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                value="{{ supplier.email }}">

        </div>



        <div class="mb-3">

            <label class="form-label">
                Address
            </label>

            <textarea
                name="address"
                class="form-control">{{ supplier.address }}</textarea>

        </div>



        <button class="btn btn-primary">
            Update Supplier
        </button>


        <a href="/suppliers/" class="btn btn-secondary">
            Cancel
        </a>


    </form>


</div>


{% endblock %}
