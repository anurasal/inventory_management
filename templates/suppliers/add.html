{% extends "layout.html" %}

{% block title %}
Add Supplier
{% endblock %}


{% block content %}

<div class="container mt-4">

    <h2>Add Supplier</h2>


    <form method="POST">


        <div class="mb-3">

            <label class="form-label">
                Supplier Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Enter supplier name"
                required>

        </div>



        <div class="mb-3">

            <label class="form-label">
                Contact Person
            </label>

            <input
                type="text"
                name="contact_person"
                class="form-control"
                placeholder="Enter contact person">

        </div>



        <div class="mb-3">

            <label class="form-label">
                Phone Number
            </label>

            <input
                type="text"
                name="phone"
                class="form-control"
                placeholder="Enter phone number">

        </div>



        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter email">

        </div>



        <div class="mb-3">

            <label class="form-label">
                Address
            </label>

            <textarea
                name="address"
                class="form-control"
                placeholder="Enter address"></textarea>

        </div>



        <button class="btn btn-primary">
            Save Supplier
        </button>


        <a href="/suppliers/" class="btn btn-secondary">
            Cancel
        </a>


    </form>


</div>


{% endblock %}
