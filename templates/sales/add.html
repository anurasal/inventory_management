{% extends "layout.html" %}

{% block title %}
Add Sale
{% endblock %}


{% block content %}

<div class="container mt-4">


<h2>Record Sale</h2>


<form method="POST">


    <div class="mb-3">

        <label class="form-label">
            Product
        </label>


        <select
            name="product_id"
            class="form-control"
            required>


            {% for product in products %}


            <option value="{{ product.id }}">

                {{ product.name }}
                (Stock: {{ product.quantity }})

            </option>


            {% endfor %}


        </select>


    </div>



    <div class="mb-3">

        <label class="form-label">
            Quantity Sold
        </label>


        <input
            type="number"
            name="quantity"
            class="form-control"
            min="1"
            required>


    </div>



    <button class="btn btn-primary">
        Save Sale
    </button>


    <a href="/sales/" class="btn btn-secondary">
        Cancel
    </a>


</form>


</div>


{% endblock %}
